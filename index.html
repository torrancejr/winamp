<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WinampEQ</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    font-family: 'Courier New', monospace;
    user-select: none;
    overflow: hidden;
  }

  .controls {
    padding: 10px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(255,255,255,0.03);
    border-bottom: 1px solid #1a1a1a;
    flex-shrink: 0;
    z-index: 10;
  }

  .controls-left {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .title {
    color: #89CFF0;
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
    text-shadow: 0 0 10px rgba(137, 207, 240, 0.5);
  }

  .toggle-group {
    display: flex;
    gap: 6px;
  }

  .toggle-btn, .theme-btn {
    background: #111;
    color: #555;
    border: 1px solid #222;
    padding: 3px 10px;
    font-size: 10px;
    font-family: 'Courier New', monospace;
    cursor: pointer;
    letter-spacing: 1px;
    border-radius: 2px;
    transition: all 0.2s;

  .toggle-btn.active {
    color: #89CFF0;
    border-color: #89CFF0;
    text-shadow: 0 0 6px rgba(137, 207, 240, 0.5);
  }

  .theme-btn:hover {
    color: #89CFF0;
    border-color: #89CFF0;
  }

  .controls-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .preamp-group {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .preamp-label {
    color: #444;
    font-size: 9px;
    letter-spacing: 1px;
  }

  .preamp-slider {
    width: 100px;
    -webkit-appearance: none;
    appearance: none;
    height: 3px;
    background: #222;
    border-radius: 2px;
    outline: none;

    text-shadow: 0 0 6px rgba(137, 207, 240, 0.5);

  .ctrl-btn:hover {

    flex: 1;

    width: 100%;
    height: 100%;

  .statusbar {
    padding: 4px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(255,255,255,0.02);
    border-top: 1px solid #1a1a1a;
    flex-shrink: 0;
    z-index: 10;
  }

  .status-text {
    color: #333;
    font-size: 9px;
    letter-spacing: 1px;
    white-space: nowrap;
  }

  .status-text.active {
    color: #89CFF0;
    text-shadow: 0 0 4px rgba(137, 207, 240, 0.4);
  }

  .now-playing {
    display: flex;
    align-items: center;
    gap: 10px;
    flex: 1;
    justify-content: center;
    overflow: hidden;
  }

  .now-playing-art {
    width: 22px;
    height: 22px;
    border-radius: 2px;
    display: none;

  .now-playing-art.visible {

  }

  .now-playing-text {
    color: #89CFF0;
    font-size: 10px;
    letter-spacing: 1px;

    overflow: hidden;
    text-overflow: ellipsis;

    text-shadow: 0 0 6px rgba(137, 207, 240, 0.3);

  .now-playing-text .artist {
    color: #556;
  }

  .freq-labels {
    display: flex;
    gap: 0;
    justify-content: space-around;
    min-width: 200px;
  }

  .freq-labels span {
    color: #333;
    font-size: 8px;
    letter-spacing: 1px;
  }

  .peak-indicator {
    display: flex;
    gap: 3px;
    align-items: center;
  }

  .peak-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #1a1a1a;
    transition: background 0.1s;

  .peak-dot.p1 { background: #89CFF0; box-shadow: 0 0 4px rgba(137, 207, 240, 0.4); }
  .peak-dot.p2 { background: #00ff64; box-shadow: 0 0 4px rgba(0, 255, 100, 0.4); }
  .peak-dot.p3 { background: #ffcc00; box-shadow: 0 0 4px rgba(255, 204, 0, 0.4); }
  .peak-dot.p4 { background: #ff6600; box-shadow: 0 0 4px rgba(255, 102, 0, 0.4); }
  .peak-dot.p5 { background: #ff0044; box-shadow: 0 0 4px rgba(255, 0, 68, 0.4); }

  /* Spotify setup modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 100;
    justify-content: center;
    align-items: center;
  }

  .modal-overlay.visible {
    display: flex;
  }

  .modal {
    background: #111;
    border: 1px solid #222;
    border-radius: 6px;
    padding: 30px;
    max-width: 420px;
    width: 90%;
  }

  .modal h2 {
    color: #1DB954;
    font-size: 14px;
    letter-spacing: 2px;
    margin-bottom: 16px;
  }

  .modal p {
    color: #666;
    font-size: 11px;
    line-height: 1.6;
    margin-bottom: 12px;
  }

  .modal input {
    width: 100%;
    background: #0a0a0a;
    border: 1px solid #333;
    color: #89CFF0;
    padding: 8px 12px;
    font-family: 'Courier New', monospace;
    font-size: 12px;
    border-radius: 3px;
    margin-bottom: 16px;
    outline: none;
  }

  .modal input:focus {
    border-color: #1DB954;
  }

  .modal-buttons {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
  }

  .modal-btn {
    background: #1DB954;
    color: #000;
    border: none;
    padding: 6px 20px;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    border-radius: 3px;
    cursor: pointer;
  }

  .modal-btn.cancel {
    background: #333;
    color: #888;
  }
</style>
</head>
<body>

<div class="controls">
  <div class="controls-left">
    <span class="title">WinampEQ</span>
    <div class="toggle-group">
      <button class="toggle-btn active" data-mode="bars">BARS</button>
      <button class="toggle-btn" data-mode="gradient">GRAD</button>
      <button class="toggle-btn" data-mode="mirror">MIRR</button>
      <button class="toggle-btn" data-mode="radial">RADIAL</button>
    </div>
  </div>
  <div class="controls-right">
    <div class="preamp-group">
      <span class="preamp-label">GAIN</span>
      <input type="range" class="preamp-slider" id="preamp" min="0.5" max="4" step="0.1" value="1.5">
      <span class="preamp-value" id="preampValue">1.5x</span>
    </div>
    <button class="theme-btn" id="themeBtn">NEON</button>
    <button class="ctrl-btn spotify" id="spotifyBtn">SPOTIFY</button>
    <button class="ctrl-btn" id="startBtn">START</button>
  </div>
</div>

<div class="canvas-wrap">
  <canvas id="canvas"></canvas>
</div>

<div class="statusbar">
  <span class="status-text" id="statusText">READY</span>
  <div class="now-playing">
    <img class="now-playing-art" id="albumArt" src="" alt="">
    <span class="now-playing-text" id="nowPlaying"></span>
  </div>
  <div class="freq-labels">
    <span>60</span><span>170</span><span>310</span><span>600</span>
    <span>1K</span><span>3K</span><span>6K</span><span>12K</span><span>16K</span>
  </div>
  <div class="peak-indicator">
    <div class="peak-dot" id="pk1"></div>
    <div class="peak-dot" id="pk2"></div>
    <div class="peak-dot" id="pk3"></div>
    <div class="peak-dot" id="pk4"></div>
    <div class="peak-dot" id="pk5"></div>
  </div>
</div>

<!-- Spotify Client ID modal -->
<div class="modal-overlay" id="spotifyModal">
  <div class="modal">
    <h2>CONNECT SPOTIFY</h2>
    <p>1. Go to developer.spotify.com/dashboard<br>
       2. Create an app<br>
       3. Set redirect URI to: <strong style="color:#89CFF0">https://winamp-eq.vercel.app</strong><br>
       4. Copy your Client ID below</p>
    <input type="text" id="clientIdInput" placeholder="Paste your Spotify Client ID here">
    <div class="modal-buttons">
      <button class="modal-btn cancel" id="modalCancel">CANCEL</button>
      <button class="modal-btn" id="modalConnect">CONNECT</button>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const startBtn = document.getElementById('startBtn');
const statusText = document.getElementById('statusText');
const preampSlider = document.getElementById('preamp');
const preampValueEl = document.getElementById('preampValue');
const themeBtn = document.getElementById('themeBtn');
const spotifyBtn = document.getElementById('spotifyBtn');
const spotifyModal = document.getElementById('spotifyModal');
const clientIdInput = document.getElementById('clientIdInput');
const modalCancel = document.getElementById('modalCancel');
const modalConnect = document.getElementById('modalConnect');
const albumArtEl = document.getElementById('albumArt');
const nowPlayingEl = document.getElementById('nowPlaying');

let audioCtx, analyser, source, dataArray, animId;
let modes = new Set(['bars']); // multi-select for bars/gradient/mirror
let preamp = 1.5;
let peakValues = new Float32Array(128);
let peakDecay = new Float32Array(128);
let smoothBars = new Float32Array(128);
let running = false;

// --- Spotify (PKCE Auth Flow) ---
const REDIRECT_URI = 'https://winamp-eq.vercel.app';
const SCOPES = 'user-read-currently-playing user-read-playback-state';
let spotifyToken = null;
let spotifyPollInterval = null;
let currentTrackId = null;

// PKCE helpers
function generateRandomString(length) {
  const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-._~';
  const values = crypto.getRandomValues(new Uint8Array(length));
  return Array.from(values, v => chars[v % chars.length]).join('');
}

async function sha256(plain) {
  const encoder = new TextEncoder();
  return crypto.subtle.digest('SHA-256', encoder.encode(plain));
}

function base64urlEncode(buffer) {
  return btoa(String.fromCharCode(...new Uint8Array(buffer)))
    .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
}

async function startPKCEAuth(clientId) {
  const verifier = generateRandomString(64);
  const challenge = base64urlEncode(await sha256(verifier));
  localStorage.setItem('spotify_code_verifier', verifier);
  localStorage.setItem('spotify_client_id', clientId);

  const authUrl = 'https://accounts.spotify.com/authorize' +
    '?client_id=' + encodeURIComponent(clientId) +
    '&response_type=code' +
    '&redirect_uri=' + encodeURIComponent(REDIRECT_URI) +
    '&scope=' + encodeURIComponent(SCOPES) +
    '&code_challenge_method=S256' +
    '&code_challenge=' + challenge +
    '&show_dialog=true';
  window.location.href = authUrl;
}

async function exchangeCode(code) {
  const verifier = localStorage.getItem('spotify_code_verifier');
  const clientId = localStorage.getItem('spotify_client_id');
  if (!verifier || !clientId) return;

  const res = await fetch('https://accounts.spotify.com/api/token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams({
      client_id: clientId,
      grant_type: 'authorization_code',
      code,
      redirect_uri: REDIRECT_URI,
      code_verifier: verifier,
    }),
  });
  const data = await res.json();
  if (data.access_token) {
    spotifyToken = data.access_token;
    localStorage.setItem('spotify_token', data.access_token);
    localStorage.setItem('spotify_token_expiry', Date.now() + data.expires_in * 1000);
    if (data.refresh_token) {
      localStorage.setItem('spotify_refresh_token', data.refresh_token);
    }
    localStorage.removeItem('spotify_code_verifier');
    history.replaceState(null, '', window.location.pathname);
    onSpotifyConnected();
  }
}

async function refreshSpotifyToken() {
  const refreshToken = localStorage.getItem('spotify_refresh_token');
  const clientId = localStorage.getItem('spotify_client_id');
  if (!refreshToken || !clientId) return false;

  const res = await fetch('https://accounts.spotify.com/api/token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams({
      client_id: clientId,
      grant_type: 'refresh_token',
      refresh_token: refreshToken,
    }),
  });
  const data = await res.json();
  if (data.access_token) {
    spotifyToken = data.access_token;
    localStorage.setItem('spotify_token', data.access_token);
    localStorage.setItem('spotify_token_expiry', Date.now() + data.expires_in * 1000);
    if (data.refresh_token) {
      localStorage.setItem('spotify_refresh_token', data.refresh_token);
    }
    return true;
  }
  return false;
}

// Check for auth code or saved token on load
async function checkSpotifyCallback() {
  // Check for authorization code in URL
  const urlParams = new URLSearchParams(window.location.search);
  const code = urlParams.get('code');
  if (code) {
    await exchangeCode(code);
    return;
  }

  // Check localStorage for existing token
  const saved = localStorage.getItem('spotify_token');
  const expiry = localStorage.getItem('spotify_token_expiry');
  if (saved && expiry && Date.now() < parseInt(expiry)) {
    spotifyToken = saved;
    onSpotifyConnected();
  } else if (localStorage.getItem('spotify_refresh_token')) {
    // Try refreshing
    const ok = await refreshSpotifyToken();
    if (ok) onSpotifyConnected();
  }
}

function onSpotifyConnected() {
  spotifyBtn.textContent = 'LINKED';
  spotifyBtn.classList.add('connected');
  startPollingSpotify();
}

function startPollingSpotify() {
  if (spotifyPollInterval) clearInterval(spotifyPollInterval);
  pollSpotify();
  spotifyPollInterval = setInterval(pollSpotify, 3000);
}

async function pollSpotify() {
  if (!spotifyToken) return;
  try {
    const res = await fetch('https://api.spotify.com/v1/me/player/currently-playing', {
      headers: { 'Authorization': 'Bearer ' + spotifyToken }
    });
    if (res.status === 204) {
      nowPlayingEl.innerHTML = '<span style="color:#555">Nothing playing</span>';
      albumArtEl.classList.remove('visible');
      currentTrackId = null;
      return;
    }
    if (res.status === 401) {
      // Try refresh first
      const refreshed = await refreshSpotifyToken();
      if (refreshed) return; // will retry next poll
      spotifyToken = null;
      localStorage.removeItem('spotify_token');
      localStorage.removeItem('spotify_token_expiry');
      spotifyBtn.textContent = 'SPOTIFY';
      spotifyBtn.classList.remove('connected');
      clearInterval(spotifyPollInterval);
      nowPlayingEl.innerHTML = '<span style="color:#ff4444">Token expired — reconnect</span>';
      return;
    }
    if (!res.ok) return;

    const data = await res.json();
    if (data.item) {
      const track = data.item;
      const artist = track.artists.map(a => a.name).join(', ');
      const name = track.name;

      if (track.id !== currentTrackId) {
        currentTrackId = track.id;
        nowPlayingEl.innerHTML = `${name} <span class="artist">&mdash; ${artist}</span>`;

        // Album art
        if (track.album && track.album.images && track.album.images.length > 0) {
          const smallImg = track.album.images[track.album.images.length - 1];
          albumArtEl.src = smallImg.url;
          albumArtEl.classList.add('visible');
        }
      }
    }
  } catch (e) {
    console.error('Spotify poll error:', e);
  }
}

// Spotify button click
spotifyBtn.addEventListener('click', () => {
  if (spotifyToken) {
    // Disconnect
    spotifyToken = null;
    localStorage.removeItem('spotify_token');
    localStorage.removeItem('spotify_token_expiry');
    clearInterval(spotifyPollInterval);
    spotifyBtn.textContent = 'SPOTIFY';
    spotifyBtn.classList.remove('connected');
    nowPlayingEl.innerHTML = '';
    albumArtEl.classList.remove('visible');
    currentTrackId = null;
    return;
  }

  // Check if we have a saved client ID
  const savedId = localStorage.getItem('spotify_client_id');
  if (savedId) {
    clientIdInput.value = savedId;
  }
  spotifyModal.classList.add('visible');
});

modalCancel.addEventListener('click', () => {
  spotifyModal.classList.remove('visible');
});

modalConnect.addEventListener('click', () => {
  const clientId = clientIdInput.value.trim();
  if (!clientId) return;
  spotifyModal.classList.remove('visible');
  startPKCEAuth(clientId);
});

// --- Particles ---
const particles = [];
const MAX_PARTICLES = 300;

function spawnParticles(x, y, color, count) {
  for (let j = 0; j < count; j++) {
    if (particles.length >= MAX_PARTICLES) particles.shift();
    particles.push({
      x: x + Math.random() * 6 - 3,
      y,
      vx: (Math.random() - 0.5) * 3,
      vy: -(Math.random() * 4 + 1.5),
      life: 1,
      decay: 0.015 + Math.random() * 0.02,
      size: Math.random() * 3 + 1,
      color
    });
  }
}

function updateAndDrawParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.06;
    p.life -= p.decay;
    if (p.life <= 0) { particles.splice(i, 1); continue; }
    ctx.globalAlpha = p.life * 0.8;
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  ctx.shadowBlur = 0;
}

// --- Themes ---
const themes = {
  neon: {
    name: 'NEON',
    colors: ['#89CFF0', '#00ff64', '#ffcc00', '#ff6600', '#ff0044'],
    bg: (bass) => `rgba(${Math.floor(bass * 0.15)}, ${Math.floor(bass * 0.05)}, ${Math.floor(bass * 0.25)}, 1)`,
  },
  vapor: {
    name: 'VAPOR',
    colors: ['#ff71ce', '#01cdfe', '#05ffa1', '#b967ff', '#fffb96'],
    bg: (bass) => `rgba(${Math.floor(bass * 0.2)}, ${Math.floor(bass * 0.05)}, ${Math.floor(bass * 0.25)}, 1)`,
  },
  fire: {
    name: 'FIRE',
    colors: ['#330000', '#ff2200', '#ff6600', '#ffaa00', '#ffff66'],
    bg: (bass) => `rgba(${Math.floor(bass * 0.3)}, ${Math.floor(bass * 0.05)}, 0, 1)`,
  },
  ice: {
    name: 'ICE',
    colors: ['#001133', '#003366', '#0077aa', '#00bbdd', '#aaeeff'],
    bg: (bass) => `rgba(0, ${Math.floor(bass * 0.08)}, ${Math.floor(bass * 0.25)}, 1)`,
  },
  sleepy: {
    name: 'SLEEPY',
    colors: ['#1a1025', '#2d1b4e', '#4a2d6e', '#6b4d8a', '#8b6aaa'],
    bg: (bass) => `rgba(${Math.floor(bass * 0.04)}, ${Math.floor(bass * 0.02)}, ${Math.floor(bass * 0.08)}, 1)`,
  },
};
let themeKey = 'neon';
let theme = themes.neon;
let autoTheme = true; // time-based theme switching

// Auto-select theme based on time of day
function getTimeTheme() {
  const hour = new Date().getHours();
  // 10pm (22) to 7am = sleepy
  if (hour >= 22 || hour < 7) return 'sleepy';
  return 'neon';
}

function applyAutoTheme() {
  if (!autoTheme) return;
  const timeKey = getTimeTheme();
  if (themeKey !== timeKey) {
    themeKey = timeKey;
    theme = themes[themeKey];
    themeBtn.textContent = theme.name;
  }
}

// Check every minute for time changes
setInterval(applyAutoTheme, 60000);

// Set initial theme based on time
themeKey = getTimeTheme();
theme = themes[themeKey];
themeBtn.textContent = theme.name;

const themeKeys = Object.keys(themes);
themeBtn.addEventListener('click', () => {
  autoTheme = false; // manual override disables auto
  const idx = (themeKeys.indexOf(themeKey) + 1) % themeKeys.length;
  themeKey = themeKeys[idx];
  theme = themes[themeKey];
  themeBtn.textContent = theme.name;
  // If they cycle back to the time-appropriate theme, re-enable auto
  if (themeKey === getTimeTheme()) autoTheme = true;
});

function tColor(ratio) {
  const c = theme.colors;
  if (ratio < 0.20) return c[0];
  if (ratio < 0.40) return c[1];
  if (ratio < 0.60) return c[2];
  if (ratio < 0.80) return c[3];
  return c[4];
}

function tGradient(height) {
  const grad = ctx.createLinearGradient(0, height, 0, 0);
  const c = theme.colors;
  grad.addColorStop(0.0, c[0]);
  grad.addColorStop(0.25, c[1]);
  grad.addColorStop(0.50, c[2]);
  grad.addColorStop(0.75, c[3]);
  grad.addColorStop(1.0, c[4]);
  return grad;
}

// --- Canvas resize ---
function resizeCanvas() {
  const rect = canvas.parentElement.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.scale(dpr, dpr);
  canvas.style.width = rect.width + 'px';
  canvas.style.height = rect.height + 'px';
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// Mode toggle — BARS/GRAD/MIRR are multi-select, RADIAL is exclusive
const layerModes = ['bars', 'gradient', 'mirror'];
document.querySelectorAll('.toggle-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const m = btn.dataset.mode;
    if (m === 'radial') {
      // Radial is exclusive — toggle it on/off, clear others
      if (modes.has('radial')) {
        modes.delete('radial');
        btn.classList.remove('active');
        if (modes.size === 0) { modes.add('bars'); document.querySelector('[data-mode="bars"]').classList.add('active'); }
      } else {
        modes.clear();
        document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
        modes.add('radial');
        btn.classList.add('active');
      }
    } else {
      // Layer modes — toggle on/off, if radial was on switch out of it
      if (modes.has('radial')) {
        modes.clear();
        document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
      }
      if (modes.has(m)) {
        modes.delete(m);
        btn.classList.remove('active');
        if (modes.size === 0) { modes.add('bars'); document.querySelector('[data-mode="bars"]').classList.add('active'); }
      } else {
        modes.add(m);
        btn.classList.add('active');
      }
    }
  });
});

// Preamp
preampSlider.addEventListener('input', () => {
  preamp = parseFloat(preampSlider.value);
  preampValueEl.textContent = preamp.toFixed(1) + 'x';
});

function updatePeaks() {
  const avg = dataArray.reduce((a, b) => a + b, 0) / dataArray.length * preamp;
  document.getElementById('pk1').className = 'peak-dot' + (avg > 10 ? ' p1' : '');
  document.getElementById('pk2').className = 'peak-dot' + (avg > 40 ? ' p2' : '');
  document.getElementById('pk3').className = 'peak-dot' + (avg > 80 ? ' p3' : '');
  document.getElementById('pk4').className = 'peak-dot' + (avg > 130 ? ' p4' : '');
  document.getElementById('pk5').className = 'peak-dot' + (avg > 180 ? ' p5' : '');
}

function getBass() {
  let sum = 0;
  for (let i = 0; i < 10; i++) sum += dataArray[i];
  return (sum / 10) * preamp;
}

function draw() {
  const dpr = window.devicePixelRatio || 1;
  const width = canvas.width / dpr;
  const height = canvas.height / dpr;

  analyser.getByteFrequencyData(dataArray);
  const bass = getBass();

  // Background with bass pulse
  ctx.fillStyle = theme.bg(bass);
  ctx.fillRect(0, 0, width, height);

  const barCount = 64;
  const gap = 2;
  const barWidth = (width - gap * (barCount + 1)) / barCount;
  const segmentHeight = Math.max(3, Math.floor(height / 55));
  const segmentGap = 1;

  for (let i = 0; i < barCount; i++) {
    const freqIndex = Math.floor(Math.pow(i / barCount, 1.6) * (dataArray.length * 0.55));
    let value = dataArray[freqIndex] * preamp;
    value = Math.min(value, 255);

    // Snap up, ease down
    const target = (value / 255) * height * 0.92;
    if (target > smoothBars[i]) {
      smoothBars[i] = target;
    } else {
      smoothBars[i] += (target - smoothBars[i]) * 0.18;
    }
    const barHeight = smoothBars[i];

    const x = gap + i * (barWidth + gap);

    // Peak tracking
    if (barHeight > peakValues[i]) {
      peakValues[i] = barHeight;
      peakDecay[i] = 0;
      if (barHeight > height * 0.6) {
        spawnParticles(x + barWidth / 2, height - barHeight, tColor(barHeight / height), 2);
      }
    } else {
      peakDecay[i] += 0.35;
      peakValues[i] -= peakDecay[i];
      if (peakValues[i] < 0) peakValues[i] = 0;
    }

    if (modes.has('bars')) {
      const segments = Math.floor(barHeight / (segmentHeight + segmentGap));
      const totalSegments = Math.floor(height / (segmentHeight + segmentGap));

      for (let s = 0; s < segments; s++) {
        const ratio = s / totalSegments;
        ctx.fillStyle = tColor(ratio);
        const sy = height - s * (segmentHeight + segmentGap) - segmentHeight;
        ctx.fillRect(x, sy, barWidth, segmentHeight);
      }

      // Glow under bar
      const glowGrad = ctx.createLinearGradient(0, height, 0, height - barHeight * 0.4);
      glowGrad.addColorStop(0, tColor(0) + '15');
      glowGrad.addColorStop(1, 'transparent');
      ctx.fillStyle = glowGrad;
      ctx.fillRect(x - 1, height - barHeight * 0.4, barWidth + 2, barHeight * 0.4);

      // Peak dot
      if (peakValues[i] > 2) {
        const peakY = height - peakValues[i];
        const pc = tColor(peakValues[i] / height);
        ctx.fillStyle = pc;
        ctx.shadowColor = pc;
        ctx.shadowBlur = 10;
        ctx.fillRect(x, peakY, barWidth, 2);
        ctx.shadowBlur = 0;
      }
    }

    if (modes.has('gradient')) {
      const grad = tGradient(height);
      ctx.fillStyle = grad;
      ctx.globalAlpha = modes.size > 1 ? 0.5 : 1;
      ctx.fillRect(x, height - barHeight, barWidth, barHeight);
      ctx.globalAlpha = 1;

      // Reflection
      const refGrad = ctx.createLinearGradient(0, height, 0, height + barHeight * 0.3);
      refGrad.addColorStop(0, tColor(0) + '30');
      refGrad.addColorStop(1, 'transparent');
      ctx.fillStyle = refGrad;
      ctx.fillRect(x, height, barWidth, barHeight * 0.3);

      // Glow at top
      ctx.shadowColor = tColor(barHeight / height);
      ctx.shadowBlur = 16;
      ctx.fillRect(x, height - barHeight, barWidth, 2);
      ctx.shadowBlur = 0;
    }

    if (modes.has('mirror')) {
      const halfH = height / 2;
      const bh = (value / 255) * halfH * 0.88;

      const grad1 = ctx.createLinearGradient(0, halfH, 0, halfH - bh);
      grad1.addColorStop(0, tColor(0) + '15');
      grad1.addColorStop(0.3, theme.colors[0]);
      grad1.addColorStop(0.6, theme.colors[1]);
      grad1.addColorStop(0.85, theme.colors[2]);
      grad1.addColorStop(1, tColor(bh / halfH));
      ctx.fillStyle = grad1;
      ctx.globalAlpha = modes.size > 1 ? 0.6 : 1;
      ctx.fillRect(x, halfH - bh, barWidth, bh);
      ctx.globalAlpha = 1;

      ctx.shadowColor = tColor(bh / halfH);
      ctx.shadowBlur = 12;
      ctx.fillRect(x, halfH - bh, barWidth, 2);
      ctx.shadowBlur = 0;

      const grad2 = ctx.createLinearGradient(0, halfH, 0, halfH + bh);
      grad2.addColorStop(0, tColor(0) + '20');
      grad2.addColorStop(0.4, tColor(0) + '10');
      grad2.addColorStop(1, 'transparent');
      ctx.fillStyle = grad2;
      ctx.fillRect(x, halfH, barWidth, bh);

      ctx.fillStyle = theme.colors[0] + '25';
      ctx.fillRect(0, halfH - 0.5, width, 1);
    }
  }

  // --- Radial mode ---
  if (modes.has('radial')) {
    const cx = width / 2;
    const cy = height / 2;
    const minDim = Math.min(width, height);
    const innerR = minDim * 0.12;
    const maxR = minDim * 0.44;
    const sliceAngle = (Math.PI * 2) / barCount;

    // Bass circle glow
    const bassR = innerR + (bass / 255) * innerR * 0.5;
    const bassGlow = ctx.createRadialGradient(cx, cy, 0, cx, cy, bassR * 2);
    bassGlow.addColorStop(0, theme.colors[0] + '20');
    bassGlow.addColorStop(1, 'transparent');
    ctx.fillStyle = bassGlow;
    ctx.beginPath();
    ctx.arc(cx, cy, bassR * 2, 0, Math.PI * 2);
    ctx.fill();

    // Album art in center of radial
    if (albumArtEl.classList.contains('visible') && albumArtEl.complete && albumArtEl.naturalWidth > 0) {
      ctx.save();
      ctx.beginPath();
      ctx.arc(cx, cy, innerR - 2, 0, Math.PI * 2);
      ctx.clip();
      const artSize = (innerR - 2) * 2;
      ctx.drawImage(albumArtEl, cx - innerR + 2, cy - innerR + 2, artSize, artSize);
      ctx.restore();
    }

    for (let i = 0; i < barCount; i++) {
      const freqIndex = Math.floor(Math.pow(i / barCount, 1.6) * (dataArray.length * 0.55));
      let value = dataArray[freqIndex] * preamp;
      value = Math.min(value, 255);
      const target = (value / 255) * maxR;
      if (target > smoothBars[i]) {
        smoothBars[i] = target;
      } else {
        smoothBars[i] += (target - smoothBars[i]) * 0.18;
      }
      const bLen = smoothBars[i];

      const angle = i * sliceAngle - Math.PI / 2;
      const ratio = bLen / maxR;
      const color = tColor(ratio);

      const x1 = cx + Math.cos(angle) * innerR;
      const y1 = cy + Math.sin(angle) * innerR;
      const x2 = cx + Math.cos(angle) * (innerR + bLen);
      const y2 = cy + Math.sin(angle) * (innerR + bLen);

      const bw = Math.max(2, sliceAngle * innerR * 0.7);

      ctx.strokeStyle = color;
      ctx.lineWidth = bw;
      ctx.shadowColor = color;
      ctx.shadowBlur = 8;
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.stroke();
      ctx.shadowBlur = 0;

      if (bLen > maxR * 0.7 && bLen > peakValues[i]) {
        spawnParticles(x2, y2, color, 1);
      }

      if (bLen > peakValues[i]) {
        peakValues[i] = bLen;
        peakDecay[i] = 0;
      } else {
        peakDecay[i] += 0.3;
        peakValues[i] -= peakDecay[i];
        if (peakValues[i] < 0) peakValues[i] = 0;
      }

      if (peakValues[i] > 2) {
        const px = cx + Math.cos(angle) * (innerR + peakValues[i]);
        const py = cy + Math.sin(angle) * (innerR + peakValues[i]);
        ctx.fillStyle = color;
        ctx.shadowColor = color;
        ctx.shadowBlur = 6;
        ctx.beginPath();
        ctx.arc(px, py, 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
      }
    }

    // Inner circle ring
    ctx.strokeStyle = theme.colors[0] + '40';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(cx, cy, innerR, 0, Math.PI * 2);
    ctx.stroke();
  }

  // Draw particles on top
  updateAndDrawParticles();

  updatePeaks();
  animId = requestAnimationFrame(draw);
}

// --- Idle animation ---
function drawIdle() {
  if (running) return;
  const dpr = window.devicePixelRatio || 1;
  const width = canvas.width / dpr;
  const height = canvas.height / dpr;

  ctx.clearRect(0, 0, width, height);

  const t = Date.now() / 1000;
  const barCount = 64;
  const gap = 2;
  const barWidth = (width - gap * (barCount + 1)) / barCount;

  for (let i = 0; i < barCount; i++) {
    const h = (Math.sin(t * 1.5 + i * 0.2) + 1) * 0.1 * height;
    const x = gap + i * (barWidth + gap);
    ctx.fillStyle = 'rgba(137, 207, 240, 0.08)';
    ctx.fillRect(x, height - h, barWidth, h);
  }
  requestAnimationFrame(drawIdle);
}
drawIdle();

// --- Start/Stop ---
startBtn.addEventListener('click', async () => {
  if (running) {
    running = false;
    cancelAnimationFrame(animId);
    if (source) source.disconnect();
    if (audioCtx) audioCtx.close();
    startBtn.textContent = 'START';
    statusText.textContent = 'STOPPED';
    statusText.classList.remove('active');
    ['pk1','pk2','pk3','pk4','pk5'].forEach(id =>
      document.getElementById(id).className = 'peak-dot'
    );
    particles.length = 0;
    drawIdle();
    return;
  }

  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 2048;
    analyser.smoothingTimeConstant = 0.75;

    source = audioCtx.createMediaStreamSource(stream);
    source.connect(analyser);

    dataArray = new Uint8Array(analyser.frequencyBinCount);
    peakValues = new Float32Array(128);
    peakDecay = new Float32Array(128);
    smoothBars = new Float32Array(128);

    running = true;
    startBtn.textContent = 'STOP';
    statusText.textContent = 'LISTENING';
    statusText.classList.add('active');

    draw();
  } catch (err) {
    statusText.textContent = 'MIC DENIED';
    console.error(err);
  }
});

// Check for Spotify token on load
checkSpotifyCallback();
</script>

</body>
</html>
